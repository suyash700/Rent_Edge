version: 0.0
os: linux

files:
  - source: /
    destination: /home/ubuntu/rentedge

hooks:
  BeforeInstall:
    - location: scripts/cleanup.sh
      runas: root

  AfterInstall:
    - location: scripts/permissions.sh
      runas: root

  ApplicationStart:
    - location: scripts/start.sh
      runas: ubuntu
